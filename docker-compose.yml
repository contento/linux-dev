version: '3.9'

# Select distro via BASE_IMAGE env var (default: Ubuntu 26.04 LTS)
#   Ubuntu LTS:  BASE_IMAGE=ubuntu:26.04 docker-compose up -d
#   Debian LTS:  BASE_IMAGE=debian:trixie docker-compose up -d

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:26.04}
        INCLUDE_EXTRA_TOOLS: '${INCLUDE_EXTRA_TOOLS:-true}'
        INCLUDE_SSH_SERVER: '${INCLUDE_SSH_SERVER:-true}'
        SETUP_DOTFILES: '${SETUP_DOTFILES:-false}'

    image: linux-dev:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-linux-dev}

    # Keep container running
    stdin_open: true
    tty: true

    # SSH access — only active when image built with INCLUDE_SSH_SERVER=true
    ports:
      - "${SSH_PORT:-2222}:22"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 512M

    # Volume mounts
    volumes:
      - ./workspace:/home/dev/workspace
      - dev_home:/home/dev

    # Environment
    environment:
      TERM: xterm-256color
      SHELL: /bin/bash
      SSH_PUBLIC_KEY: ${SSH_PUBLIC_KEY:-}
      SETUP_DOTFILES: ${SETUP_DOTFILES:-false}

    # Network
    networks:
      - devnet

    # Restart policy
    restart: unless-stopped

volumes:
  dev_home:
    driver: local

networks:
  devnet:
    driver: bridge
