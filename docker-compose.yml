# Select distro via BASE_IMAGE env var (default: Ubuntu 26.04 LTS)
#   Ubuntu LTS:  BASE_IMAGE=ubuntu:26.04 docker-compose up -d
#   Debian LTS:  BASE_IMAGE=debian:trixie-slim docker-compose up -d

# Levels:
#   minimal — base packages only, bash, ~200MB
#   dev     — extra tools + SSH + dotfiles (opt-in), ~500MB (default)
#   full    — dev + python3 + nodejs + npm, ~1GB
#
# Usage:
#   docker-compose up -d                    # dev level (default)
#   LEVEL=minimal docker-compose up -d      # minimal
#   LEVEL=full docker-compose up -d         # full

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:26.04}
        LEVEL: '${LEVEL:-dev}'
        SETUP_DOTFILES: '${SETUP_DOTFILES:-false}'

    image: linux-dev:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-linux-dev}

    # Keep container running
    stdin_open: true
    tty: true

    # SSH access — only active when LEVEL != minimal
    ports:
      - "${SSH_PORT:-2222}:22"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 512M

    # Volume mounts
    volumes:
      - ./workspace:/home/dev/workspace
      - dev_home:/home/dev

    # Environment
    environment:
      TERM: xterm-256color
      SHELL: /bin/bash
      SSH_PUBLIC_KEY: ${SSH_PUBLIC_KEY:-}
      SETUP_DOTFILES: ${SETUP_DOTFILES:-false}

    # Network
    networks:
      - devnet

    # Restart policy
    restart: unless-stopped

volumes:
  dev_home:
    driver: local

networks:
  devnet:
    driver: bridge
